name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write # OIDC for npm Trusted Publishing
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Cleanup old workflow artifacts
        uses: ./.github/actions/cleanup-artifacts

      # Node/npm only for publishing and version checks. Do NOT set registry-url —
      # setup-node would inject GITHUB_TOKEN as NODE_AUTH_TOKEN and npm would send it to
      # registry.npmjs.org, breaking Trusted Publishing (OIDC).
      #
      # Trusted publishing requires npm CLI >= 11.5.1.
      # See https://docs.npmjs.com/trusted-publishers
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install npm with Trusted Publishing support
        run: npm install -g npm@^11.5.1

      # Fail when package.json version is strictly older than npm latest (allows equal:
      # merge without bump after a release already shipped).
      - name: Verify package.json version vs npm latest
        run: |
          set -euo pipefail
          PKG=$(jq -r .name package.json)
          VER=$(jq -r .version package.json)
          echo "package.json: ${PKG}@${VER}"

          SMP="$(mktemp -d)"
          npm install semver@7 --omit=dev --no-audit --no-fund --prefix "$SMP" --silent

          LATEST=$(npm view "$PKG" version 2>/dev/null || true)
          if [ -z "$LATEST" ]; then
            echo "No versions on npm yet; skipping comparison."
            exit 0
          fi
          echo "npm latest: ${LATEST}"

          node -e "
            const semver = require(require('path').join(process.argv[1], 'node_modules', 'semver'));
            const ver = process.argv[2];
            const latest = process.argv[3];
            if (semver.lt(ver, latest)) {
              console.error(
                \`::error ::package.json version \${ver} is less than npm latest \${latest}. Bump the version before merging to main.\`,
              );
              process.exit(1);
            }
          " "$SMP" "$VER" "$LATEST"

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run build:lib

      - name: Publish to npm (OIDC)
        run: |
          set -euo pipefail
          unset NODE_AUTH_TOKEN
          PKG=$(jq -r .name package.json)
          VER=$(jq -r .version package.json)
          if npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
            echo "${PKG}@${VER} already on npm; skipping publish."
          else
            npm publish
          fi

      # Tag matches package.json (vX.Y.Z). Create only when missing; never move an existing tag.
      - name: Push release tag if missing
        run: |
          set -euo pipefail
          VER=$(jq -r .version package.json)
          TAG="v${VER}"
          git fetch --tags origin || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-parse "$TAG^{commit}")
            HEAD_SHA=$(git rev-parse HEAD)
            if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
              echo "::notice ::Tag $TAG already exists at ${TAG_SHA}; HEAD is ${HEAD_SHA}. Not moving the tag."
              exit 0
            fi
            echo "Tag $TAG already points at HEAD."
            exit 0
          fi

          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VER=$(jq -r .version package.json)
          TAG="v${VER}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
            exit 0
          fi
          gh release create "$TAG" \
            dist/data-table.js dist/data-table.css \
            --title "$TAG" \
            --generate-notes
